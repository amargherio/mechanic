name: Code linting

on:
  push:
    branches:
      - master
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yaml'
      - '.github/workflows/lint.yaml'
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yaml'
      - '.github/workflows/lint.yaml'

permissions:
  contents: read

jobs:
  lint:
    if: github.event.pull_request.base.ref == 'master'
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Go
      uses: actions/setup-go@v7
      with:
        go-version-file: go.mod
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2
        args: -v --timeout 10m
    
